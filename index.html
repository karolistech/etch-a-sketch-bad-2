<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="icon" href="/etch-a-sketch-v2/favicon.ico">
    <script type="module" crossorigin src="/etch-a-sketch-v2/assets/index-C7ylyjaq.js"></script>
    <link rel="stylesheet" crossorigin href="/etch-a-sketch-v2/assets/index-CBYndnZw.css">
  </head>
  <body>
    <header class="header">
      <h1 class="header__title">Etch-a-Sketch</h1>
    </header>

    <main class="main">
      <aside class="controls">
        <div class="controls__row">
          <div class="controls__color">
            <input type="color" id="pen-color" class="controls__color-input" value="#333333">
            <label for="pen-color">Pen Color</label>
          </div>
          <div class="controls__color">
            <input type="color" id="bg-color" class="controls__color-input" value="#ffffff">
            <label for="bg-color">Background Color</label>
          </div>
        </div>

        <div class="controls__row">
          <button class="controls__btn controls__btn--random">Random Color</button>
          <button class="controls__btn controls__btn--erase">Eraser</button>
        </div>

        <div class="controls__row controls__grid-size">
          <label for="grid-size" class="controls__grid-size-label">Grid Size: 16 x 16</label>
          <input type="range" id="grid-size" class="controls__grid-size-input" min="1" max="100" value="16">
        </div>

        <div class="controls__row">
          <button class="controls__btn controls__btn--active controls__btn--grid-lines">Grid Lines</button>
          <button class="controls__btn controls__btn--clear">Clear</button>
        </div>
      </aside>

      <div class="canvas canvas--grid"></div>
    </main>
  </body>
</html>
